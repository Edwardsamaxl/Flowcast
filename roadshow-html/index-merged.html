<html lang="zh-CN">

  <title>Flowcast Roadshow Merged</title>
  <style>
    :root{--paper:#fafaf8;--ink:#0a0a0a;--muted:#737373;--line:#d4d4d2;--accent:#002fa7;--mono:"JetBrains Mono","Cascadia Code",Consolas,monospace}
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--ink);font-family:Inter,"Helvetica Neue",Arial,"Microsoft YaHei UI","Noto Sans SC",sans-serif}
    .deck{position:fixed;inset:0;display:flex;transition:transform .58s cubic-bezier(.2,0,.1,1);will-change:transform}
    .slide-shell{width:100vw;height:100vh;flex:0 0 100vw;background:var(--paper);position:relative;overflow:hidden}
    iframe{width:100%;height:100%;border:0;display:block;background:var(--paper);pointer-events:none}
    .nav{position:fixed;left:5vw;right:5vw;bottom:2.2vh;display:flex;justify-content:space-between;align-items:center;pointer-events:none;color:rgba(255,255,255,.72);font:clamp(10px,.75vw,13px)/1 var(--mono);z-index:9;text-transform:uppercase;letter-spacing:.04em}
    .dots{display:flex;gap:8px;pointer-events:auto}
    .dot{width:18px;height:3px;border:0;background:rgba(255,255,255,.28);padding:0;cursor:pointer}
    .dot.active{background:#fff}
    .overview .deck{transform:none!important;flex-wrap:wrap;overflow:auto;width:100vw;height:100vh;padding:2vw;gap:2vw;background:var(--ink)}
    .overview .slide-shell{transform:scale(.23);transform-origin:top left;margin-right:-77vw;margin-bottom:-77vh;box-shadow:0 0 0 1px rgba(255,255,255,.25);cursor:pointer}
    .overview iframe{pointer-events:none}
    .overview .nav{display:none}
  </style>
</head>

    .slide::after{content:&quot;&quot;;position:absolute;left:5vw;right:5vw;bottom:4.3vh;height:1px;background:currentColor;opacity:.22}

    .chrome{position:absolute;left:5vw;right:5vw;top:3.2vh;display:flex;justify-content:space-between;align-items:flex-start;font-family:var(--mono);font-size:.76vw;letter-spacing:.16em;text-transform:uppercase;color:inherit;opacity:.62;z-index:5}
    .pager{position:fixed;right:2.1vw;bottom:2.1vh;z-index:20;background:var(--ink);color:var(--paper);border:1px solid var(--paper);padding:.58vh .75vw;font-family:var(--mono);font-size:.72vw;letter-spacing:.08em}
    .hint{position:fixed;left:2.1vw;bottom:2.1vh;z-index:20;color:var(--paper);font-family:var(--mono);font-size:.68vw;letter-spacing:.08em;opacity:.74}

    h1,h2,h3,p,figure{margin:0}
    .mono{font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase}
    .kicker{font-family:var(--mono);font-size:.78vw;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600}
    .h-cover{font-size:min(12.2vw,20vh);line-height:.86;font-weight:200;letter-spacing:-.04em}
    .h-xl{font-size:min(5.7vw,10.2vh);line-height:1.02;font-weight:200;letter-spacing:-.025em}
    .h-md{font-size:2.35vw;line-height:1.18;font-weight:300;letter-spacing:-.01em}
    .lead{font-size:1.32vw;line-height:1.48;font-weight:400;color:var(--muted)}
    .dark .lead{color:#c8c8c4}
    .body{font-size:1.02vw;line-height:1.58;font-weight:400;color:#3f3f3c}
    .dark .body{color:#d7d7d2}
    .hairline{height:1px;background:currentColor;opacity:.24;width:100%}
    .accent-block{background:var(--accent);color:var(--accent-on);padding:1.1vh 1vw;font-weight:600}
    .ink-block{background:var(--ink);color:var(--paper);padding:1vh 1vw}

    .cover{display:grid;grid-template-rows:1fr auto;height:100%;padding-top:10vh}
    .cover-main{align-self:center}
    .cover-slogan{margin-top:3.2vh;font-size:2.55vw;line-height:1.18;font-weight:300}
    .cover-def{margin-top:4.2vh;width:44vw;padding-top:2vh;border-top:1px solid currentColor;font-size:1.22vw;line-height:1.45;color:var(--muted)}
    .cover-mark{position:absolute;right:5vw;top:13vh;width:31vw;height:31vw;border:1px solid var(--line);display:grid;place-items:center;color:var(--accent)}
    .cover-mark::before,.cover-mark::after{content:&quot;&quot;;position:absolute;background:var(--accent)}
    .cover-mark::before{width:78%;height:1px;transform:rotate(35deg)}
    .cover-mark::after{width:1px;height:78%;transform:rotate(35deg)}
    .cover-mark span{position:absolute;font-family:var(--mono);font-size:.78vw;letter-spacing:.16em;text-transform:uppercase;color:var(--ink);background:var(--paper);padding:.6vh .8vw}

    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:3vw;height:100%;padding-top:10vh;align-items:start}
    .credential-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1vw;margin-top:4vh}
    .credential{border-top:2px solid var(--ink);padding-top:1.2vh;min-height:10vh}
    .credential small{display:block;font-family:var(--mono);font-size:.66vw;letter-spacing:.13em;text-transform:uppercase;color:var(--muted)}
    .credential strong{display:block;margin-top:1vh;font-size:1.35vw;font-weight:600}
    .poster-row{display:grid;grid-template-columns:1fr 1fr;gap:1vw;margin-top:3.6vh;height:31vh}
    .evidence-card{background:white;border:1px solid var(--line);overflow:hidden;position:relative}
    .evidence-card img{width:100%;height:100%;object-fit:cover;object-position:center top}
    .evidence-card figcaption{position:absolute;left:0;bottom:0;background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:.68vw;letter-spacing:.12em;text-transform:uppercase;padding:.64vh .7vw}
    .social-wall{display:grid;grid-template-columns:repeat(3,1fr);gap:.8vw;height:67vh}
    .phone{background:white;border:1px solid var(--line);overflow:hidden;position:relative}
    .phone img{width:100%;height:100%;object-fit:cover;object-position:center top}
    .phone figcaption{position:absolute;left:0;top:0;background:var(--accent);color:var(--accent-on);font-weight:600;font-size:.84vw;padding:.62vh .7vw}

    .research{display:grid;grid-template-columns:19vw 1fr 23vw;gap:2vw;height:100%;padding-top:13vh}
    .metrics{display:grid;gap:2.3vh;align-self:start}
    .metric{border-top:2px solid var(--ink);padding-top:1.2vh}
    .metric .num{font-size:7.6vw;line-height:.78;font-weight:200;letter-spacing:-.05em;color:var(--accent)}
    .metric .label{margin-top:1.1vh;font-size:1.16vw;line-height:1.28;font-weight:600}
    .wall-label{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1vh;font-weight:600}
    .wall-label span:last-child{font-family:var(--mono);font-size:.62vw;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
    .sample-wall{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:1fr;gap:.65vw;height:58vh}
    .sample,.chat{background:white;border:1px solid var(--line);overflow:hidden}
    .sample img,.chat img{width:100%;height:100%;object-fit:cover;object-position:center top}
    .chat-stack{display:grid;grid-template-rows:repeat(4,1fr);gap:.65vw;height:58vh}

    .pain{display:grid;grid-template-columns:39vw 1fr;gap:3.2vw;height:100%;padding-top:11vh}
    .pain-list{display:grid;gap:1.2vh;margin-top:4vh}
    .pain-item{display:grid;grid-template-columns:2.1vw 1fr;gap:1vw;border-top:1px solid var(--line);padding:1.4vh 0;font-size:1.18vw;line-height:1.48;font-weight:400}
    .xmark{width:1.42vw;height:1.42vw;background:var(--accent);color:var(--accent-on);display:grid;place-items:center;font-family:var(--mono);font-size:.82vw;font-weight:700;margin-top:.35vh}
    .competitor{border:1px solid var(--line);background:white;padding:1.4vh 1vw}
    .competitor-shot{height:31vh;border:1px solid var(--line);display:grid;place-items:center;background:var(--soft);overflow:hidden}
    .competitor-shot img{width:100%;height:100%;object-fit:contain}

    .opportunity{display:grid;grid-template-columns:40vw 1fr;gap:3.4vw;height:100%;padding-top:20vh}
    .radar{position:relative;height:48vh;border-right:1px solid var(--line)}
    .radar svg{position:absolute;left:50%;top:50%;width:24vw;height:24vw;transform:translate(-50%,-50%)}
    .radar-label{position:absolute;width:10vw;font-size:.98vw;line-height:1.3;font-weight:600}
    .radar-label small{display:block;margin-top:.35vh;font-family:var(--mono);font-size:.58vw;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:400}
    .r1{left:15vw;top:0;text-align:center}.r2{right:.4vw;top:16.6vh}.r3{right:3vw;bottom:0}.r4{left:2vw;bottom:0;text-align:right}.r5{left:0;top:16.6vh;text-align:right}
    .center-verdict{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:9vw;height:9vw;background:var(--accent);color:var(--accent-on);display:grid;place-items:center;text-align:center;font-size:1.18vw;line-height:1.18;font-weight:600}
    .reason-list{display:grid;gap:.8vh}
    .reason{display:grid;grid-template-columns:5.5vw 1fr;gap:1vw;border-top:1px solid var(--ink);padding:1.25vh 0}
    .reason strong{font-size:1.1vw;color:var(--accent)}
    .reason p{font-size:1vw;line-height:1.46;color:#343431}

    .closing{display:grid;grid-template-columns:1fr 42vw;gap:4vw;height:100%;padding-top:13vh;align-items:center}
    .qr-row{display:grid;grid-template-columns:1fr 1fr;gap:2vw}
    .qr-card{border:1px solid var(--line);background:white;padding:1.3vh 1vw 1.5vh}
    .qr-card img{width:100%;height:43vh;object-fit:contain;background:white}
    .qr-card figcaption{border-top:1px solid var(--line);margin-top:1.2vh;padding-top:1vh;text-align:center;font-size:1.05vw;font-weight:600}
    .flow-mini{display:flex;align-items:center;gap:.8vw;margin-top:5vh;flex-wrap:wrap}
    .mini{border:1px solid currentColor;width:4.1vw;height:4.1vw;display:grid;place-items:center;font-size:.9vw;font-weight:600}
    .arrow{font-family:var(--mono);color:var(--accent)}

    .abs-title{position:absolute;left:5vw;top:8.6vh;z-index:2}
    .p3-title{width:36vw}
    .stamp{display:inline-block;border:2px solid var(--accent);color:var(--accent);padding:.9vh 1vw;font-size:1.1vw;line-height:1.25;font-weight:700;transform:rotate(-2deg);background:var(--paper)}

    @media (max-aspect-ratio:4/3){
      .slide{padding-left:4vw;padding-right:4vw}
      .h-xl{font-size:5vw}
      .lead{font-size:1.15vw}
      .research{grid-template-columns:17vw 1fr 21vw}
      .social-wall{height:62vh}
    }

  <div class="nav"><span id="page">01 / 06</span><div class="dots" id="dots"></div><span>Arrow keys / ESC overview</span></div>
  <script>
    const deck = document.getElementById('deck');
    const slides = [...document.querySelectorAll('.slide-shell')];
    const dots = document.getElementById('dots');
    const page = document.getElementById('page');
    let index = 0;

    slides.forEach((slide, n) => {
      const button = document.createElement('button');
      button.className = 'dot';
      button.type = 'button';
      button.addEventListener('click', () => go(n));
      dots.appendChild(button);
      slide.addEventListener('click', () => {
        if (document.body.classList.contains('overview')) go(n);
      });
    });

    function go(next){
      index = Math.max(0, Math.min(slides.length - 1, next));
      document.body.classList.remove('overview');
      deck.style.transform = 'translateX(' + (-index * 100) + 'vw)';
      page.textContent = String(index + 1).padStart(2, '0') + ' / ' + String(slides.length).padStart(2, '0');
      document.querySelectorAll('.dot').forEach((dot, n) => dot.classList.toggle('active', n === index));
      document.title = 'Flowcast Roadshow Merged - ' + page.textContent;
    }

    addEventListener('keydown', event => {
      if(event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' '){ event.preventDefault(); go(index + 1); }
      if(event.key === 'ArrowLeft' || event.key === 'PageUp'){ event.preventDefault(); go(index - 1); }
      if(event.key === 'Home') go(0);
      if(event.key === 'End') go(slides.length - 1);
      if(/^[1-6]$/.test(event.key)) go(Number(event.key) - 1);
      if(event.key === 'Escape') document.body.classList.toggle('overview');
    });

    let startX = null;
    addEventListener('pointerdown', event => { startX = event.clientX; });
    addEventListener('pointerup', event => {
      if(startX === null) return;
      const delta = event.clientX - startX;
      if(Math.abs(delta) > 60) go(index + (delta < 0 ? 1 : -1));
      startX = null;
    });

    const initial = Math.max(1, Math.min(slides.length, Number(new URLSearchParams(location.search).get('slide')) || 1));
    go(initial - 1);
  </script>
